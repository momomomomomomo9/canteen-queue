<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Pinghe Canteen Queue - 平和学校</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --orange: #ff9500; --red: #ff3b30; --bg: #f8f9fa; }
        body { font-family: -apple-system, "SF Pro Display", sans-serif; background: var(--bg); margin: 0; color: #1d1d1f; }
        
        /* 顶部装饰 */
        .top-nav { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #efefef; }
        .school-badge { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; }
        .lang-switcher { background: #f2f2f7; border: none; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--blue); cursor: pointer; }

        /* 主状态卡片 */
        .hero-card { background: #fff; margin: 15px; padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .hero-card::before { content: ""; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--blue); }
        .id-label { font-size: 12px; color: #8e8e93; letter-spacing: 1px; margin-bottom: 5px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 5px; }

        /* 四个功能小图标 */
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px; margin-bottom: 20px; }
        .tool-item { background: #fff; padding: 12px 5px; border-radius: 16px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .tool-item:active { transform: scale(0.95); }
        .tool-icon { font-size: 20px; margin-bottom: 5px; }
        .tool-label { font-size: 11px; font-weight: 600; color: #666; }

        /* 号码展示区 */
        .number-display { text-align: center; margin: 20px 0; }
        .num-label { font-size: 14px; color: #8e8e93; font-weight: 500; }
        .num-value { font-size: 80px; font-weight: 800; color: var(--blue); line-height: 1; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        /* 底部固定操作区 (和你要求的一样) */
        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #eee; }
        .btn { border: none; border-radius: 18px; padding: 18px 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .btn-take { background: var(--blue); color: #fff; box-shadow: 0 8px 20px rgba(0,122,255,0.3); }
        .btn-call { background: var(--green); color: #fff; box-shadow: 0 8px 20px rgba(52,199,89,0.3); }
        .btn span { font-size: 11px; opacity: 0.8; font-weight: 400; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 80%; max-width: 300px; padding: 30px; border-radius: 28px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-close { margin-top: 20px; color: var(--blue); font-weight: 600; cursor: pointer; }

        .notice-box { margin: 15px; padding: 15px; background: #fff; border-radius: 16px; font-size: 13px; color: #666; line-height: 1.5; border: 1px solid #eee; margin-bottom: 120px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="school-badge">🏫 <span data-key="school">平和学校</span></div>
    <button class="lang-switcher" onclick="toggleLang()">English</button>
</div>

<div class="hero-card">
    <div class="id-label">ID: 106409</div>
    <h2 style="margin: 5px 0;" data-key="title">食堂叫号助手</h2>
    <div style="font-size: 13px; color: var(--green);"><span class="status-dot"></span><span data-key="status">取号开启中</span></div>
    
    <div class="number-display">
        <div class="num-label" data-key="serving">正在呼叫 Serving</div>
        <div class="num-value" id="currentNum">000</div>
        <div id="myTicketInfo" style="display:none; border-top:1px dashed #eee; padding-top:15px; margin-top:15px;">
            <div class="num-label" data-key="mine">我的号码 My Number</div>
            <div style="font-size:32px; font-weight:800; color:var(--orange);" id="myNumDisplay">---</div>
            <div style="font-size:12px; color:var(--red); font-weight:600;" id="waitInfo"></div>
        </div>
    </div>
</div>

<div class="tool-grid">
    <div class="tool-item" onclick="openModal('qrModal')"><div class="tool-icon">🔳</div><div class="tool-label" data-key="tool1">排队码</div></div>
    <div class="tool-item" onclick="openModal('resetModal')"><div class="tool-icon">🔄</div><div class="tool-label" data-key="tool2">归零</div></div>
    <div class="tool-item" onclick="openModal('msgModal')"><div class="tool-icon">💬</div><div class="tool-label" data-key="tool3">公告</div></div>
    <div class="tool-item" onclick="openModal('setModal')"><div class="tool-icon">⚙️</div><div class="tool-label" data-key="tool4">设置</div></div>
</div>

<div class="notice-box">
    <b>Announcement:</b> <span data-key="notice">请在叫号后及时前往取餐，过号请重新取号。Please pick up your meal on time.</span>
</div>

<div class="bottom-actions">
    <button class="btn btn-take" onclick="takeTicket()">
        <div data-key="btnTake">立即取号</div>
        <span>Get Ticket</span>
    </button>
    <button class="btn btn-call" onclick="callNext()">
        <div data-key="btnCall">开始叫号</div>
        <span>Call Next</span>
    </button>
</div>

<div id="qrModal" class="modal"><div class="modal-content"><h3>QR Code</h3><div style="background:#f2f2f7; height:150px; display:flex; align-items:center; justify-content:center; border-radius:12px; margin:15px 0;">[ 二维码 ]</div><div class="modal-close" onclick="closeModal('qrModal')">Close</div></div></div>
<div id="resetModal" class="modal"><div class="modal-content"><h3>Reset</h3><p>确定要全部清空归零吗？<br>Confirm reset all data?</p><button class="btn btn-take" style="background:var(--red)" onclick="location.reload()">Confirm</button><div class="modal-close" onclick="closeModal('resetModal')">Cancel</div></div></div>
<div id="msgModal" class="modal"><div class="modal-content"><h3>Notice</h3><p data-key="notice">请保持排队秩序</p><div class="modal-close" onclick="closeModal('msgModal')">OK</div></div></div>
<div id="setModal" class="modal"><div class="modal-content"><h3>Settings</h3><p>Version 2.0.1 (Stable)</p><div class="modal-close" onclick="closeModal('setModal')">Close</div></div></div>

<script>
    const lang = {
        'zh': {
            'school': '平和学校', 'title': '食堂叫号助手', 'status': '取号开启中', 'serving': '正在呼叫',
            'mine': '我的号码', 'tool1': '排队码', 'tool2': '归零', 'tool3': '公告', 'tool4': '设置',
            'btnTake': '立即取号', 'btnCall': '开始叫号', 'notice': '请在叫号后及时前往取餐，过号请重新取号。',
            'wait': '前面还有 {n} 人'
        },
        'en': {
            'school': 'Pinghe School', 'title': 'Queue Assistant', 'status': 'System Online', 'serving': 'Now Serving',
            'mine': 'My Number', 'tool1': 'QR Code', 'tool2': 'Reset', 'tool3': 'Notice', 'tool4': 'Setup',
            'btnTake': 'Get Ticket', 'btnCall': 'Call Next', 'notice': 'Please collect your food promptly when called.',
            'wait': '{n} people ahead'
        }
    };

    let curLang = 'zh';
    let queue = []; let servingNum = 0; let myTicket = null;

    function toggleLang() {
        curLang = curLang === 'zh' ? 'en' : 'zh';
        document.querySelector('.lang-switcher').innerText = curLang === 'zh' ? 'English' : '中文';
        updateUI();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function updateUI() {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            el.innerText = lang[curLang][key];
        });
        document.getElementById('currentNum').innerText = servingNum.toString().padStart(3, '0');
        if(myTicket) {
            document.getElementById('myTicketInfo').style.display = 'block';
            document.getElementById('myNumDisplay').innerText = myTicket.toString().padStart(3, '0');
            let ahead = queue.indexOf(myTicket);
            document.getElementById('waitInfo').innerText = ahead >= 0 ? lang[curLang]['wait'].replace('{n}', ahead) : "到您了！It's your turn!";
        }
    }

    function takeTicket() {
        let next = (queue.length > 0 ? queue[queue.length-1] : Math.max(servingNum, 0)) + 1;
        myTicket = next; queue.push(next); updateUI();
    }

    function callNext() {
        if(queue.length > 0) {
            servingNum = queue.shift();
            const voice = curLang === 'zh' ? `请${servingNum}号取餐` : `Number ${servingNum}, please.`;
            const msg = new SpeechSynthesisUtterance(voice);
            msg.lang = curLang === 'zh' ? 'zh-CN' : 'en-US';
            window.speechSynthesis.speak(msg);
            updateUI();
        } else { alert(curLang === 'zh' ? "没有人排队" : "Queue is empty"); }
    }

    updateUI();
</script>
</body>
</html>

</body>
</html>
