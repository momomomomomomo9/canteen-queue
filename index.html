<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平和学校食堂排队</title>
    <style>
        body { font-family: sans-serif; background: #f5f6fa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .big-num { font-size: 60px; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        button { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>学生取号</h2>
        <div id="status">目前排队：<span id="total">0</span> 人</div>
        <div id="myNumberSection" style="display:none">
            <p>你的号码是：</p>
            <div class="big-num" id="myNum">-</div>
        </div>
        <button onclick="getTicket()">立即取号</button>
    </div>

    <div class="card" style="border-top: 5px solid #3498db;">
        <h2>食堂管理 (老板用)</h2>
        <p>正在呼叫：</p>
        <div class="big-num" id="current">---</div>
        <button style="background:#3498db" onclick="next()">呼叫下一位</button>
    </div>

    <script>
        let q = []; let cur = 0; let mine = null;
        function getTicket() {
            let n = (q.length > 0 ? q[q.length-1] : cur) + 1;
            q.push(n); mine = n;
            document.getElementById('myNumberSection').style.display = 'block';
            document.getElementById('myNum').innerText = n;
            update();
        }
        function next() {
            if(q.length > 0) { 
                cur = q.shift(); 
                const msg = new SpeechSynthesisUtterance("请" + cur + "号取餐");
                window.speechSynthesis.speak(msg);
                update(); 
            } else { alert("无人排队"); }
        }
        function update() {
            document.getElementById('total').innerText = q.length;
            document.getElementById('current').innerText = cur || "---";
        }
    </script>
</body>
</html>
