<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>平和学校食堂排队助手</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --blue: #007aff; --green: #34c759; --red: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        /* 顶部 */
        .header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .school-name { font-weight: 800; font-size: 18px; }

        .container { padding: 15px; }

        /* 模式选择器 */
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #fff; border: 2px solid transparent; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s; color: #666; }
        .mode-btn.active { border-color: var(--blue); color: var(--blue); background: #eef6ff; }

        /* 号码显示大卡片 */
        .card { background: #fff; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .serving-label { color: var(--green); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .serving-num { font-size: 80px; font-weight: 900; color: var(--green); line-height: 1; margin: 15px 0; }
        
        /* 学生号码信息 */
        .my-ticket { background: var(--blue); color: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: none; }
        .my-num { font-size: 50px; font-weight: 900; }

        /* 公告 */
        .notice-box { background: #fff; border-left: 4px solid var(--blue); padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.6; text-align: left; color: #444; }

        /* 底部操作区 */
        .action-area { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px 20px 30px; border-top: 1px solid #eee; }
        .btn { width: 100%; border: none; border-radius: 16px; padding: 18px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-take { background: var(--blue); color: #fff; }
        .btn-call { background: var(--green); color: #fff; display: none; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 动画 */
        .fade { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="school-name">🏫 平和学校食堂</div>
    <div id="status" style="font-size:12px; color:var(--red);">● 连接中</div>
</div>

<div class="container">
    <div class="mode-selector">
        <div id="studentTab" class="mode-btn active" onclick="switchMode('student')">🙋‍♂️ 我是学生</div>
        <div id="adminTab" class="mode-btn" onclick="switchMode('admin')">👔 我是管理</div>
    </div>

    <div class="card">
        <div class="serving-label">正在呼叫 NOW SERVING</div>
        <div class="serving-num" id="servingDisplay">000</div>
        <div id="totalInfo" style="font-size:12px; color:#999;">总排队人数: 0</div>
    </div>

    <div id="myTicketArea" class="my-ticket fade">
        <div style="font-size:14px; opacity:0.9;">我的号码 MY NUMBER</div>
        <div class="my-num" id="myNumDisplay">000</div>
        <div id="waitStatus" style="font-size:14px; font-weight:bold; margin-top:5px;"></div>
    </div>

    <div class="notice-box">
        <b style="color:var(--blue)">📢 公告提示：</b><br>
        <span id="noticeContent">厉行节约，光盘行动。每位同学每天限领 3 次号，过号请重新排队。</span>
    </div>
</div>

<div class="action-area">
    <button id="takeBtn" class="btn btn-take" onclick="handleTake()">立即取号 Get Ticket</button>
    <button id="callBtn" class="btn btn-call fade" onclick="handleCall()">🔊 语音叫号 Call Next</button>
</div>

<script>
    // --- 实时数据配置 ---
    const TOPIC = "pinghe_canteen_unified_2024"; 
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    
    let serving = 0;
    let total = 0;
    let myNumber = null;
    let isAdminVerified = false;

    // --- 取号限制 ---
    let today = new Date().toDateString();
    let count = localStorage.getItem('takeCount_' + today) || 0;

    client.on('connect', () => {
        document.getElementById('status').innerText = "● 实时同步中";
        document.getElementById('status').style.color = "var(--green)";
        client.subscribe(TOPIC);
    });

    client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());
        if(data.type === 'sync') {
            serving = data.serving;
            total = data.total;
            document.getElementById('servingDisplay').innerText = serving.toString().padStart(3, '0');
            document.getElementById('totalInfo').innerText = "总排队人数: " + total;
            updateWaitStatus();
        }
    });

    // --- 切换模式 ---
    function switchMode(mode) {
        document.getElementById('studentTab').classList.remove('active');
        document.getElementById('adminTab').classList.remove('active');
        
        if(mode === 'student') {
            document.getElementById('studentTab').classList.add('active');
            document.getElementById('takeBtn').style.display = 'block';
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('noticeContent').innerText = "厉行节约，光盘行动。每位同学每天限领 3 次号，过号请重新排队。";
        } else {
            // 进入管理模式需要验证
            if(!isAdminVerified) {
                const pw = prompt("请输入管理员密码进入叫号系统:");
                if(pw === "123456") {
                    isAdminVerified = true;
                } else {
                    alert("密码错误，无法开启叫号模式");
                    switchMode('student');
                    return;
                }
            }
            document.getElementById('adminTab').classList.add('active');
            document.getElementById('takeBtn').style.display = 'none';
            document.getElementById('callBtn').style.display = 'block';
            document.getElementById('noticeContent').innerText = "管理模式已开启。请按顺序叫号，系统将自动进行语音播报。";
        }
    }

    // --- 学生取号 ---
    function handleTake() {
        if(count >= 3) return alert("今日取号机会已用完");
        
        total++;
        myNumber = total;
        count++;
        localStorage.setItem('takeCount_' + today, count);
        
        document.getElementById('myTicketArea').style.display = 'block';
        document.getElementById('myNumDisplay').innerText = myNumber.toString().padStart(3, '0');
        document.getElementById('takeBtn').innerText = `已领取 (${count}/3)`;
        if(count >= 3) document.getElementById('takeBtn').disabled = true;

        broadcast();
    }

    // --- 管理叫号 ---
    function handleCall() {
        if(serving < total) {
            serving++;
            const speech = new SpeechSynthesisUtterance(`请${serving}号同学到柜台取餐`);
            window.speechSynthesis.speak(speech);
            broadcast();
        } else {
            alert("当前没有人在排队");
        }
    }

    // --- 数据广播 ---
    function broadcast() {
        client.publish(TOPIC, JSON.stringify({
            type: 'sync',
            serving: serving,
            total: total
        }));
    }

    function updateWaitStatus() {
        if(!myNumber) return;
        const wait = myNumber - serving;
        const el = document.getElementById('waitStatus');
        if(wait > 0) {
            el.innerText = `等待中：前面还有 ${wait} 人`;
            el.style.color = "rgba(255,255,255,0.8)";
        } else {
            el.innerText = "到您了！请立即取餐";
            el.style.color = "#ffeb3b";
        }
    }

    // 初始化按钮状态
    if(count >= 3) {
        document.getElementById('takeBtn').disabled = true;
        document.getElementById('takeBtn').innerText = "今日次数已达上限";
    }
</script>

</body>
</html>
</script>
</body>
</html>
