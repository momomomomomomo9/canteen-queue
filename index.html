<script>
    // 1. 更换为更稳定的多协议服务器
    const TOPIC = "PH_SCHOOL_CANTEEN_FINAL_SYNC_2026"; 
    const client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt', {
        clientId: 'PH_CLIENT_' + Math.random().toString(16).substr(2, 8),
        keepalive: 30,
        reconnectPeriod: 1000,
        clean: true
    });
    
    let serving = 0, total = 0, myNumber = null;
    let today = new Date().toDateString();
    let count = Number(localStorage.getItem('takeCount_' + today)) || 0;

    // 连接后立即订阅并尝试拉取最新数据
    client.on('connect', () => {
        client.subscribe(TOPIC);
        console.log("Connected to Sync Server");
        // 广播一个请求，让在线的其他手机把数据发过来
        client.publish(TOPIC, JSON.stringify({type: 'request'}));
    });

    client.on('message', (t, m) => {
        try {
            const data = JSON.parse(m.toString());
            if (data.type === 'sync') {
                serving = Number(data.serving);
                total = Number(data.total);
                updateUI();
            } else if (data.type === 'request' && total > 0) {
                // 如果有新手机加入并请求数据，本手机回复它
                broadcast();
            }
        } catch(e) { console.error("Sync Error"); }
    });

    // 模式切换（保持原逻辑）
    function switchView(view) {
        const studentView = document.getElementById('studentView');
        const adminView = document.getElementById('adminView');
        if(view === 'admin') {
            if(prompt("Admin Password:") !== "123456") return;
            adminView.style.display = 'block';
            studentView.style.display = 'none';
        } else {
            adminView.style.display = 'none';
            studentView.style.display = 'block';
        }
    }

    function handleTake() {
        if(count >= 3) return alert("Limit Reached");
        total++; 
        myNumber = total; 
        count++;
        localStorage.setItem('takeCount_' + today, count);
        if(document.getElementById('takeTime')) {
            document.getElementById('takeTime').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
        broadcast();
        updateUI();
    }

    function handleCall() {
        if(serving < total) {
            serving++;
            if('speechSynthesis' in window) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(serving + "号请取餐"));
            }
            broadcast();
            updateUI();
        }
    }

    function handleReset() {
        if(!confirm("Reset?")) return;
        serving = 0; total = 0;
        broadcast();
        location.reload();
    }

    // 核心同步发送
    function broadcast() {
        if(client.connected) {
            client.publish(TOPIC, JSON.stringify({
                type: 'sync',
                serving: serving,
                total: total
            }));
        }
    }

    function updateUI() {
        // 自动适配你界面中的所有元素，不改变它们
        if(document.getElementById('callTxt')) document.getElementById('callTxt').innerText = serving > 0 ? serving + " 号" : "无";
        if(document.getElementById('statTotal')) document.getElementById('statTotal').innerText = total;
        if(document.getElementById('statServing')) document.getElementById('statServing').innerText = serving;
        if(myNumber && document.getElementById('dispNum')) {
            document.getElementById('dispNum').innerText = myNumber.toString().padStart(3,'0');
            let wait = myNumber - serving;
            if(document.getElementById('waitCount')) document.getElementById('waitCount').innerText = wait > 0 ? wait : 0;
            if(document.getElementById('statusTxt')) {
                document.getElementById('statusTxt').innerText = wait > 0 ? "排队中" : "请取餐";
            }
        }
        if(document.getElementById('limitInfo')) document.getElementById('limitInfo').innerText = "今日剩余: " + (3 - count);
        const takeBtn = document.getElementById('takeBtn');
        if(takeBtn && count >= 3) {
            takeBtn.disabled = true;
            takeBtn.innerText = "次数已满";
        }
    }

    updateUI();
</script>
